      - heading "How to do it" [level=2] [ref=e40]
      - list [ref=e41]:
        - listitem [ref=e42]: Place two dots about 10 cm apart on the page.
        - listitem [ref=e43]: Hover your pen above the start dot. Move your arm — not your fingers — along the imaginary line to the end dot. Twice. Without touching the paper. This is the ghost.
        - listitem [ref=e44]: On the third pass, touch down and draw the line in one confident motion. Don’t slow down near the end.
        - listitem [ref=e45]: Repeat across the whole page. Then do diagonals. Then verticals.
      - heading "What to look for" [level=2] [ref=e46]
      - paragraph [ref=e47]: Tick whatever feels true. There’s no gold star — these are signals to yourself.
