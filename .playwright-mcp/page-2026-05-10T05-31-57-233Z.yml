      - list [ref=e43]:
        - listitem [ref=e44]: Fill a row with circles roughly 2 cm wide. Don’t lift the pen mid-circle. Aim for closed loops, not perfect ones.
        - listitem [ref=e45]: Below it, a row of squares — straight edges, sharp corners, closed.
        - listitem [ref=e46]: Below that, a row of triangles — three confident strokes, corners meeting.
        - listitem [ref=e47]: Now do a row of each at 1 cm. Then 4 cm. Then 0.5 cm. Vary the scale.
